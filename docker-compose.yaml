version: "3.8"

services:
  mautrix-candy:
    container_name: mautrix-candy
    image: mautrix-candy:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      - UID=1000
      - GID=1000
    # If you're using a postgres database, uncomment the following:
    # depends_on:
    #   - postgres

  # Uncomment and configure if you need a database
  # For SQLite (default), no database container is needed
