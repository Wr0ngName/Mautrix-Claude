stages:
  - build
  - docker

variables:
  REGISTRY: dev.wn:5000
  IMAGE_NAME: mautrix-candy
  GO_VERSION: "1.23"

build:
  stage: build
  script:
    - go version
    - go mod download
    - CGO_ENABLED=1 go build -tags goolm -o mautrix-candy
        -ldflags "-s -w
          -X main.Tag=${CI_COMMIT_TAG:-${CI_COMMIT_REF_NAME}}
          -X main.Commit=${CI_COMMIT_SHA}
          -X 'main.BuildTime=$(date -Iseconds)'"
        ./cmd/mautrix-candy
    - ./mautrix-candy --version
  artifacts:
    paths:
      - mautrix-candy
    expire_in: 1 hour

docker:
  stage: docker
  needs:
    - build
  script:
    - docker build
        --build-arg COMMIT_HASH=${CI_COMMIT_SHA}
        --build-arg BUILD_TIME=$(date -Iseconds)
        --build-arg VERSION=${CI_COMMIT_TAG:-0.1.0}
        -t ${REGISTRY}/${IMAGE_NAME}:latest
        -t ${REGISTRY}/${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}
        .
    - docker push ${REGISTRY}/${IMAGE_NAME}:latest
    - docker push ${REGISTRY}/${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
    - if: $CI_COMMIT_TAG
      when: always
    - when: manual
